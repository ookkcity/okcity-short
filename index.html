<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OKCTㄉ短網址生成器</title>
  <style>
    :root{
      --bg:#0b1220; --card:#111a2e; --text:#e8eefc; --muted:#aab6d6;
      --accent:#6aa9ff; --danger:#ff6a7a; --ok:#4fe3b6; --line:#243150;
    }
    body{ margin:0; font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif; background:linear-gradient(180deg,#070b14, #0b1220); color:var(--text); }
    .wrap{ max-width:1080px; margin:0 auto; padding:20px 16px 80px; }
    .title{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom: 20px; }
    h1{ margin:0; font-size:20px; letter-spacing:.5px; }
    .title-header { width: 100%; display: flex; justify-content: space-between; align-items: flex-end; }
    .sub{ color:var(--muted); font-size:12px; }

    .card{ margin-top:16px; background:rgba(17,26,46,.85); border:1px solid var(--line); border-radius:14px; padding:16px; }
    label{ display:block; font-size:13px; color:var(--muted); margin-bottom:8px; }

    input, textarea{
      width:100%; box-sizing:border-box; border-radius:12px; border:1px solid var(--line);
      background:#0b1326; color:var(--text); padding:12px; font-size:15px;
      outline:none; appearance: none;
    }
    input:focus, textarea:focus{ border-color:rgba(106,169,255,.7); box-shadow:0 0 0 3px rgba(106,169,255,.15); }

    .row{ display:grid; grid-template-columns: 1fr auto; gap:10px; align-items:end; }

    .btn{
      border:1px solid rgba(106,169,255,.45);
      background:rgba(106,169,255,.14); color:var(--text);
      padding:12px 16px; border-radius:12px; cursor:pointer; font-weight:600;
      text-decoration:none; display:inline-flex; align-items:center; justify-content:center;
      transition: 0.2s; font-size: 14px; min-width: 80px;
    }
    .btn:hover{ background:rgba(106,169,255,.22); }
    .btn:active{ transform: scale(0.98); }
    .btn.secondary{ border-color:rgba(170,182,214,.35); background:rgba(170,182,214,.10); }
    .btn.danger{ border-color:rgba(255,106,122,.45); background:rgba(255,106,122,.12); }

    .msg{ margin-top:10px; font-size:13px; color:var(--muted); min-height: 18px; }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }

    .login-fab{
      position:fixed; left:18px; bottom:18px;
      width:46px; height:46px; border-radius:14px;
      border:1px solid var(--line);
      background:rgba(17,26,46,.92);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; user-select:none; z-index: 100;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
    }
    .badge{
      position:fixed; left:74px; bottom:28px;
      padding:6px 10px; border-radius:999px;
      border:1px solid var(--line); background:rgba(17,26,46,.92);
      font-size:12px; color:var(--muted); z-index: 99;
    }

    table{ width:100%; border-collapse:collapse; overflow:hidden; border-radius:14px; }
    thead{ background:#0b1326; }
    thead th{
      color:var(--muted); font-size:12px;
      text-align:left; padding:12px 10px; border-bottom:1px solid var(--line);
    }
    tbody td{ padding:12px 10px; border-bottom:1px solid rgba(36,49,80,.55); vertical-align:top; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .small{ font-size:12px; color:var(--muted); line-height: 1.5; }
    .actions{ display:flex; gap:8px; flex-wrap:wrap; }
    .pill{ display:inline-block; padding:2px 8px; border:1px solid rgba(170,182,214,.25); border-radius:999px; color:var(--muted); font-size:11px; }
    .hidden{ display:none !important; }
    .url-cell { display: flex; flex-direction: column; gap: 8px; }

    @media (max-width: 600px) {
      .row { grid-template-columns: 1fr; }
      .row .btn { width: 100%; }
      thead { display: none; }
      table, tbody, tr, td { display: block; width: 100%; box-sizing: border-box; }
      tr {
        margin-bottom: 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255,255,255,0.02);
        padding: 12px;
      }
      td { border: none; padding: 8px 0; }
      td::before {
        content: attr(data-label);
        display: block;
        font-size: 11px;
        color: var(--accent);
        margin-bottom: 4px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .actions .btn.danger { grid-column: span 2; }
      .time-info { display: flex; justify-content: space-between; border-top: 1px solid var(--line); padding-top: 8px; margin-top: 4px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <div class="title-header">
        <h1>OKCTㄉ短網址生成器</h1>
        <div class="sub"><span class="pill" id="loginStatePill">此網站BY 典典</span></div>
      </div>
    </div>

    <div class="card">
      <label>原網址（需含 https:// 或 http://）</label>
      <div class="row">
        <input id="longUrl" placeholder="貼上網址" />
        <button class="btn" onclick="createShort()">生成</button>
      </div>
      <div class="msg" id="createMsg"></div>
      <div id="createActions" style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;"></div>
    </div>

    <div class="card hidden" id="adminCard">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom: 15px;">
        <div style="font-weight:700;">管理</div>
        <div style="display:flex; gap:8px;">
          <button class="btn secondary" style="padding: 8px 12px;" onclick="loadList()">重新整理</button>
          <button class="btn danger" style="padding: 8px 12px;" onclick="logout()">登出</button>
        </div>
      </div>

      <div class="msg" id="listMsg"></div>

      <div style="margin-top:12px;">
        <table id="listTable">
          <thead>
            <tr>
              <th style="width:18%">短碼</th>
              <th style="width:44%">網址</th>
              <th style="width:18%">紀錄</th>
              <th style="width:20%"> </th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="login-fab" onclick="toggleLogin()" title="登入/登出">
    <span>🔑</span>
  </div>
  <div class="badge" id="badge">ok._.city</div>

  <script>
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwJa5RPGW3O7ec8wV99gLSs4224ufMD4g8duA7t5RpKrQkDY98qO2LrwgFuMwxV34hC/exec';
    const ADMIN_PASSWORD = '123';

    const storageKey = 'okcity_short_admin_token';
    let adminToken = localStorage.getItem(storageKey) || '';

    function isLoggedIn(){ return !!adminToken; }

    function setUI(){
      document.getElementById('adminCard').classList.toggle('hidden', !isLoggedIn());
      document.getElementById('loginStatePill').textContent = isLoggedIn() ? '已登入管理模式' : '此網站BY 典典';
      document.getElementById('badge').textContent = isLoggedIn() ? '管理模式' : 'ok._.city';
    }

    function jsonp(url){
      return new Promise((resolve, reject) => {
        const cb = 'cb_' + Math.random().toString(36).slice(2);
        window[cb] = (data) => {
          try { delete window[cb]; } catch(e){}
          script.remove();
          resolve(data);
        };
        const script = document.createElement('script');
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
        script.onerror = () => reject(new Error('連線超時'));
        document.body.appendChild(script);
      });
    }

    // 支援 GitHub Pages 根目錄/子路徑
    function getBasePath(){
      const p = location.pathname;
      if (p.endsWith('.html')) return p.replace(/\/[^\/]*$/, '');
      return p.replace(/\/$/, '');
    }

    // 方案2：短網址輸出成自家網域路徑（/code）
    function shortUrlFromCode(code){
      const basePath = getBasePath();
      return location.origin.replace(/\/$/, '') + basePath + '/' + encodeURIComponent(code);
    }

    function setMsg(id, text, type){
      const el = document.getElementById(id);
      el.textContent = text || '';
      el.className = 'msg' + (type ? (' ' + type) : '');
    }

    async function createShort(){
      const longUrl = document.getElementById('longUrl').value.trim();
      if(!longUrl) return alert('請輸入網址');

      setMsg('createMsg', '正在生成中...', '');
      document.getElementById('createActions').innerHTML = '';

      const u = new URL(GAS_ENDPOINT);
      u.searchParams.set('action', 'create');
      u.searchParams.set('url', longUrl);

      try{
        const res = await jsonp(u.toString());
        if(!res.ok) throw new Error(res.error || '失敗');

        const su = shortUrlFromCode(res.code);
        setMsg('createMsg', `完成！`, 'ok');

        document.getElementById('createActions').innerHTML = `
          <button class="btn secondary" onclick="copyBtnAction(this, '${su}')">複製連結</button>
          <a class="btn" href="${su}" target="_blank">直接開啟</a>
        `;
        if(isLoggedIn()) loadList();
      }catch(err){
        setMsg('createMsg', '失敗：' + err.message, 'err');
      }
    }

    async function copyBtnAction(btn, text) {
      const originalText = btn.textContent;
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = '已複製！';
        setTimeout(() => { btn.textContent = originalText; }, 2000);
      } catch (e) {
        prompt('請複製：', text);
      }
    }

    async function toggleLogin(){
      if(isLoggedIn()){
        if(confirm('確定要登出？')) logout();
        return;
      }
      const pwd = prompt('管理員密碼：');
      if(!pwd) return;
      if(pwd.trim() !== ADMIN_PASSWORD){
        alert('密碼不對喔');
        return;
      }
      adminToken = ADMIN_PASSWORD;
      localStorage.setItem(storageKey, adminToken);
      setUI();
      loadList();
    }

    function logout(){
      adminToken = '';
      localStorage.removeItem(storageKey);
      setUI();
      document.getElementById('tbody').innerHTML = '';
    }

    async function loadList(){
      if(!isLoggedIn()) return;
      setMsg('listMsg', '還在跑拉...你慢慢等...', '');

      const u = new URL(GAS_ENDPOINT);
      u.searchParams.set('action', 'list');
      u.searchParams.set('token', adminToken);

      try{
        const res = await jsonp(u.toString());
        if(!res.ok) throw new Error(res.error || '讀取失敗');
        renderTable(res.items || []);
        setMsg('listMsg', `共 ${res.items.length} 筆`, 'ok');
      }catch(err){
        setMsg('listMsg', '讀取失敗：' + err.message, 'err');
      }
    }

    function escapeHtml(s){
      return String(s || "").replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderTable(items){
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      items.forEach(it => {
        const tr = document.createElement('tr');
        const su = shortUrlFromCode(it.code);

        tr.innerHTML = `
          <td data-label="短碼">
            <div class="url-cell">
              <input data-oldcode="${escapeHtml(it.code)}" class="codeInput mono"
                     value="${escapeHtml(it.code)}" placeholder="短碼(可改)" />
              <a href="${escapeHtml(su)}" target="_blank" class="mono"
                 style="color:var(--accent); text-decoration:none; font-weight:bold;">
                 開啟目前短連結
              </a>
            </div>
          </td>

          <td data-label="網址">
            <div class="url-cell">
              <input data-code="${escapeHtml(it.code)}" class="urlInput" value="${escapeHtml(it.url)}" placeholder="https://" />
              <textarea data-code="${escapeHtml(it.code)}" class="noteInput note-input" rows="2" placeholder="輸入備註內容...">${escapeHtml(it.note || '')}</textarea>
            </div>
          </td>

          <td data-label="update">
            <div class="time-info">
              <div class="small">建：<span class="mono">${escapeHtml((it.createdAt || '').split('T')[0])}</span></div>
              <div class="small">更：<span class="mono">${escapeHtml((it.updatedAt || '').split('T')[0])}</span></div>
            </div>
          </td>

          <td data-label=" ">
            <div class="actions">
              <button class="btn" onclick="saveRow('${escapeHtml(it.code)}')">儲存</button>
              <button class="btn secondary" onclick="renameRow('${escapeHtml(it.code)}')">改短碼</button>
              <button class="btn secondary" onclick="copyBtnAction(this, '${escapeHtml(su)}')">複製</button>
              <button class="btn danger" onclick="deleteRow('${escapeHtml(it.code)}')">刪除</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function renameRow(oldCode){
      const codeEl = document.querySelector(`.codeInput[data-oldcode="${CSS.escape(oldCode)}"]`);
      if(!codeEl) return alert('找不到短碼輸入欄位');

      const newCode = codeEl.value.trim();
      if(!newCode) return alert('請輸入新短碼');

      // ✅ 改成 4 碼純數字
      if(!/^\d{4}$/.test(newCode)) return alert('短碼格式錯誤：需為4碼數字');

      if(newCode === oldCode){
        setMsg('listMsg', '短碼未變更', '');
        return;
      }

      if(!confirm(`確定要把短碼 ${oldCode} 改成 ${newCode}？\n改完舊短碼將失效`)) {
        codeEl.value = oldCode;
        return;
      }

      const u = new URL(GAS_ENDPOINT);
      u.searchParams.set('action', 'rename');
      u.searchParams.set('token', adminToken);
      u.searchParams.set('oldCode', oldCode);
      u.searchParams.set('newCode', newCode);

      setMsg('listMsg', `修改短碼中：${oldCode} → ${newCode}`, '');
      try{
        const res = await jsonp(u.toString());
        if(!res.ok) throw new Error(res.error || 'rename failed');
        setMsg('listMsg', `已修改短碼：${oldCode} → ${newCode}`, 'ok');
        loadList();
      }catch(err){
        alert('修改短碼失敗：' + err.message);
        codeEl.value = oldCode;
      }
    }

    async function saveRow(code){
      const urlEl = document.querySelector(`.urlInput[data-code="${CSS.escape(code)}"]`);
      const noteEl = document.querySelector(`.noteInput[data-code="${CSS.escape(code)}"]`);
      if(!urlEl || !noteEl) return alert('找不到欄位');

      const url = urlEl.value.trim();
      const note = noteEl.value;

      const u = new URL(GAS_ENDPOINT);
      u.searchParams.set('action', 'update');
      u.searchParams.set('token', adminToken);
      u.searchParams.set('code', code);
      u.searchParams.set('url', url);
      u.searchParams.set('note', note);

      setMsg('listMsg', `更新 ${code} 中...`, '');
      try{
        const res = await jsonp(u.toString());
        if(!res.ok) throw new Error(res.error);
        setMsg('listMsg', `已儲存`, 'ok');
        loadList();
      }catch(err){
        alert('儲存失敗：' + err.message);
      }
    }

    async function deleteRow(code){
      if(!confirm(`刪除後不可恢復，確定刪除 ${code}？`)) return;

      const u = new URL(GAS_ENDPOINT);
      u.searchParams.set('action', 'delete');
      u.searchParams.set('token', adminToken);
      u.searchParams.set('code', code);

      try{
        const res = await jsonp(u.toString());
        if(!res.ok) throw new Error(res.error || 'delete failed');
        loadList();
      }catch(err){
        alert('刪除失敗：' + err.message);
      }
    }

    setUI();
    if(isLoggedIn()) loadList();
  </script>
</body>
</html>
